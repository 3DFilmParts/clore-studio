<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<!-- T13 Camera Tape: paper ground with the brand's camera-tape frame art
     (reel-frames/frame-h.png, generated + approved), taped polaroid product
     card, editorial type block. Part of the CLORE design system tape family.
     LOGO: pass the INK logo variant (light ground).
     BADGE fills the red circle badge top right; empty badge hides it.
     PRICE may be empty; it hides cleanly.
     NOTE: the background image path is relative to clore-templates/.
     TAPEBG slot: fill with reel-frames/frame-b|f|g|h|i.png (Camera Tape 1-5).
     On dark grounds (frame-b, frame-g) pass the WHITE logo variant. -->
<link rel="stylesheet" href="../node_modules/@fontsource/archivo-black/index.css">
<link rel="stylesheet" href="../node_modules/@fontsource/jetbrains-mono/index.css">
<link rel="stylesheet" href="../node_modules/@fontsource/jetbrains-mono/700.css">
<link rel="stylesheet" href="tokens.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: var(--clore-paper); }

  .card {
    position: relative;
    background: var(--clore-paper) url('{{TAPEBG}}') center / cover no-repeat;
    overflow: hidden;
  }

  .format-square .card { width: 1080px; height: 1080px; }
  .format-portrait .card { width: 1080px; height: 1350px; }
  .format-story .card { width: 1080px; height: 1920px; }
  .format-webbanner .card { width: 1600px; height: 600px; }
  .format-emailbanner .card { width: 1200px; height: 400px; }

  .top {
    position: absolute;
    top: 56px;
    left: 64px;
    right: 64px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    z-index: 3;
  }
  .format-story .top { top: 72px; left: 72px; right: 72px; }
  .logo { height: 52px; width: auto; }
  .format-story .logo { height: 64px; }

  .circle-badge {
    width: 148px;
    height: 148px;
    border-radius: var(--clore-radius-pill);
    background: var(--clore-signal-red);
    color: var(--clore-white);
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-family: var(--clore-font-mono);
    font-weight: 700;
    font-size: 20px;
    line-height: 1.35;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 18px;
    transform: rotate(4deg);
  }
  .circle-badge:empty { display: none; }

  /* Taped polaroid product card */
  .photo-card {
    position: absolute;
    top: 200px;
    left: 50%;
    width: 620px;
    height: 620px;
    margin-left: -310px;
    background: var(--clore-white);
    padding: 22px 22px 64px;
    box-shadow: 0 24px 60px rgba(20, 20, 20, 0.22);
    transform: rotate(-2.5deg);
    z-index: 1;
  }
  .format-story .photo-card { top: 300px; width: 700px; height: 700px; margin-left: -350px; }
  .format-portrait .photo-card { top: 240px; }
  .photo-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .tape {
    position: absolute;
    width: 220px;
    height: 56px;
    background: rgba(242, 239, 232, 0.92);
    box-shadow: 0 4px 10px rgba(20, 20, 20, 0.14);
    font-family: var(--clore-font-mono);
    font-weight: 700;
    font-size: 20px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--clore-ink);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2;
  }
  .tape-tl { top: -20px; left: -46px; transform: rotate(-8deg); }
  .tape-br { bottom: 30px; right: -52px; transform: rotate(6deg); background: var(--clore-signal-red); color: var(--clore-white); }

  .content {
    position: absolute;
    left: 64px;
    right: 64px;
    bottom: 52px;
    z-index: 3;
    background: rgba(242, 239, 232, 0.9);
    padding: 34px 38px 30px;
  }
  .format-story .content { left: 72px; right: 72px; bottom: 96px; }

  .eyebrow {
    font-family: var(--clore-font-mono);
    font-weight: 700;
    font-size: 24px;
    letter-spacing: var(--clore-track-eyebrow);
    text-transform: lowercase;
    color: var(--clore-signal-red);
    margin-bottom: 18px;
  }
  .format-story .eyebrow { font-size: 28px; }

  h1 {
    font-family: var(--clore-font-display);
    font-size: 64px;
    line-height: var(--clore-lh-head);
    letter-spacing: var(--clore-track-head);
    text-transform: uppercase;
    color: var(--clore-ink);
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .format-story h1 { font-size: 84px; -webkit-line-clamp: 3; }

  .rule {
    width: var(--clore-ebar-w);
    height: var(--clore-ebar-h);
    background: var(--clore-signal-red);
    margin-top: 22px;
  }

  .meta { display: flex; align-items: center; gap: 28px; margin-top: 22px; }
  .price {
    font-family: var(--clore-font-mono);
    font-weight: 700;
    font-size: 38px;
    color: var(--clore-ink);
  }
  .price:empty { display: none; }
  .format-story .price { font-size: 46px; }

  .cta-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-top: 24px;
  }
  .cta {
    font-family: var(--clore-font-mono);
    font-weight: 700;
    font-size: 26px;
    letter-spacing: var(--clore-track-label);
    text-transform: uppercase;
    color: var(--clore-ink);
  }
  .format-story .cta { font-size: 30px; }
  .arrow { color: var(--clore-signal-red); }
  .handle {
    font-family: var(--clore-font-mono);
    font-weight: 400;
    font-size: 22px;
    letter-spacing: var(--clore-track-meta);
    color: var(--clore-faint);
  }

  /* Banner variants: photo card right, text panel left */
  .format-webbanner .photo-card, .format-emailbanner .photo-card {
    left: auto;
    margin-left: 0;
  }
  .format-webbanner .photo-card { top: 40px; right: 90px; width: 460px; height: 460px; padding: 16px 16px 44px; }
  .format-emailbanner .photo-card { top: 30px; right: 70px; width: 300px; height: 300px; padding: 12px 12px 32px; }
  .format-emailbanner .tape { width: 150px; height: 40px; font-size: 14px; }
  .format-webbanner .tape { width: 180px; height: 48px; font-size: 17px; }
  .format-webbanner .circle-badge, .format-emailbanner .circle-badge { display: none; }
  .format-webbanner .top { top: 48px; left: 64px; right: auto; }
  .format-emailbanner .top { top: 36px; left: 48px; right: auto; }
  .format-emailbanner .logo { height: 36px; }
  .format-webbanner .content { left: 64px; right: 46%; bottom: 48px; padding: 26px 30px 24px; }
  .format-emailbanner .content { left: 48px; right: 42%; bottom: 32px; padding: 18px 22px 16px; }
  .format-webbanner .eyebrow { font-size: 20px; margin-bottom: 12px; }
  .format-emailbanner .eyebrow { font-size: 16px; margin-bottom: 8px; }
  .format-webbanner h1 { font-size: 52px; }
  .format-emailbanner h1 { font-size: 36px; }
  .format-webbanner .rule { margin-top: 16px; }
  .format-emailbanner .rule { display: none; }
  .format-webbanner .meta { margin-top: 16px; }
  .format-emailbanner .meta { margin-top: 10px; }
  .format-webbanner .price { font-size: 30px; }
  .format-emailbanner .price { font-size: 24px; }
  .format-webbanner .cta-row { margin-top: 18px; }
  .format-emailbanner .cta-row { margin-top: 12px; }
  .format-webbanner .cta { font-size: 21px; }
  .format-emailbanner .cta { font-size: 16px; }
  .format-webbanner .handle, .format-emailbanner .handle { display: none; }
</style>
</head>
<body class="format-{{FORMAT}}">
  <div class="card">
    <div class="top">
      <img class="logo" src="{{LOGO}}" alt="3D Film Parts">
      <div class="circle-badge">{{BADGE}}</div>
    </div>
    <div class="photo-card">
      <div class="tape tape-tl">CAM A</div>
      <img src="{{IMAGE}}" alt="">
      <div class="tape tape-br">GOOD TAKE</div>
    </div>
    <div class="content">
      <div class="eyebrow">{{EYEBROW}}</div>
      <h1>{{TITLE}}</h1>
      <div class="rule"></div>
      <div class="meta"><span class="price">{{PRICE}}</span></div>
      <div class="cta-row">
        <span class="cta">SHOP NOW <span class="arrow">-&gt;</span> 3DFILMPARTS.COM</span>
        <span class="handle">@3dfilmparts</span>
      </div>
    </div>
  </div>
</body>
</html>
